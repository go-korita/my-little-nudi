<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>갯민숭달팽이 위젯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== COLLAPSED 상태 ====== -->
  <div id="collapsed-view">
    <div id="speech-bubble">
      <span id="speech-text">할 일 없음</span>
    </div>
    <div id="character-area">
      <canvas id="character-canvas" width="146" height="146"></canvas>
      <img id="character-img" class="hidden character-fallback" src="" alt="">
      <div id="badge" class="hidden">0</div>
    </div>
  </div>

  <!-- ====== EXPANDED 상태 ====== -->
  <div id="expanded-view" class="hidden">
    <!-- 말풍선 카드 -->
    <div id="card">
      <div id="card-header">
        <span id="card-title">오늘 할 일</span>
        <div class="header-btns">
          <button id="weekly-btn" title="이번 주">☰</button>
          <button id="collapse-btn" title="접기">−</button>
        </div>
      </div>
      <div id="todo-list"></div>
      <div id="input-area">
        <input type="text" id="todo-input" placeholder="+ 빠르게 추가하기">
      </div>
    </div>
    <!-- 캐릭터 (카드 아래) -->
    <div id="expanded-bottom">
      <canvas id="header-char-canvas" width="96" height="96"></canvas>
      <img id="header-char-img" class="hidden character-fallback" src="" alt="">
    </div>
  </div>

  <!-- ====== WEEKLY 상태 ====== -->
  <div id="weekly-view" class="hidden">
    <div id="weekly-header">
      <span id="weekly-title">이번 주</span>
    </div>
    <div id="weekly-columns">
      <!-- renderer.js가 동적으로 생성 -->
    </div>
    <!-- 캐릭터: 카드 밖, 오늘 날짜 아래에 절대 위치로 배치 -->
    <div id="weekly-char-row">
      <canvas id="weekly-char-canvas" width="64" height="64"></canvas>
      <img id="weekly-char-img" class="hidden character-fallback" src="" alt="">
    </div>
  </div>

  <script src="node_modules/@rive-app/canvas/rive.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
