<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캐릭터 선택</title>
  <link rel="stylesheet" href="onboarding.css">
</head>
<body>
  <div id="onboarding-wrap">
    <p id="onboarding-title">어떤 친구랑 함께할까요?</p>
    <div id="character-grid">
      <div class="char-card" data-id="nudi">
        <img src="assets/characters/nudi/preview.png" alt="누디" onerror="this.style.display='none'">
      </div>
      <div class="char-card" data-id="char-b">
        <img src="assets/characters/char-b/preview.png" alt="캐릭터 B" onerror="this.style.display='none'">
      </div>
      <div class="char-card" data-id="char-c">
        <img src="assets/characters/char-c/preview.png" alt="캐릭터 C" onerror="this.style.display='none'">
      </div>
      <div class="char-card" data-id="char-d">
        <img src="assets/characters/char-d/preview.png" alt="캐릭터 D" onerror="this.style.display='none'">
      </div>
    </div>
    <button id="start-btn" disabled>시작하기</button>
  </div>
  <script src="onboarding.js"></script>
</body>
</html>
